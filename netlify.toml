[build]
  publish = "."
  command = "echo 'No build step needed for static site'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Resource-Policy = "same-site"
    Content-Security-Policy = "default-src 'self' https://*.clarity.ms https://c.bing.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.bunny.net https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://www.clarity.ms https://*.clarity.ms; connect-src 'self' https://*.clarity.ms https://c.bing.com; font-src 'self' data: https://fonts.gstatic.com https://fonts.bunny.net; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
