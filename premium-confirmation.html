    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];

  <link rel="icon" href="assets/favicon.jpg" type="image/jpeg" />

<body class="premium-confirmation-page">
  <noscript>
    <img
      height="1"
      width="1"
      style="display:none"
      src="https://www.facebook.com/tr?id=930964623159302&ev=PageView&noscript=1"
      alt=""
    />
  </noscript>
  <div class="page-transition-overlay"></div>

  <main class="premium-confirmation">
    <section class="premium-confirmation-card scroll-reveal" data-reveal="fade-up">
      <img
        class="premium-confirmation-logo"
        src="assets/logo_avec_yeux.jpeg"
        alt="Logo Silvousplait"
        width="180"
        height="180"
      />
      <p class="premium-confirmation-kicker">Silvousplait Premium</p>
      <h1>Merci pour votre abonnement&nbsp;!</h1>
      <p>Vous recevrez vos premieres offres dans votre boite courriel sous peu.</p>
      <a class="premium-confirmation-link" href="premium-offers.html" data-coming-soon-message="Les offres premium arrivent tres bientot. Cette fonctionnalite est en cours de finalisation.">Voir les offres premium</a>
      <a class="premium-confirmation-link" href="index.html">Retourner au site</a>
    </section>
  </main>

  <script src="script.js"></script>
  <script>if (typeof window.initScrollReveal === 'function') window.initScrollReveal();</script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var sessionId = params.get('session_id');
      var plan = (params.get('plan') || '').trim().toLowerCase();
      if (typeof window.fbq !== 'function') return;

      var hasTrackedPurchase = false;
      var fallbackTimer = null;

      function getFallbackPayload(planKey) {
        if (planKey === 'monthly') {
          return { value: 9.20, currency: 'CAD' };
        }
        if (planKey === 'yearly') {
          return { value: 69.00, currency: 'CAD' };
        }
        if (planKey === 'trial') {
          return { value: 0.00, currency: 'CAD' };
        }
        return null;
      }

      function trackPurchase(payload) {
        if (hasTrackedPurchase || !payload) return;
        hasTrackedPurchase = true;
        if (fallbackTimer) {
          clearTimeout(fallbackTimer);
          fallbackTimer = null;
        }
        fbq('track', 'Purchase', {
          value: payload.value,
          currency: payload.currency
        });
      }

      var fallbackPayload = getFallbackPayload(plan);
      if (fallbackPayload) {
        fallbackTimer = setTimeout(function () {
          trackPurchase(fallbackPayload);
        }, 1500);
      }

      if (!sessionId) {
        trackPurchase(fallbackPayload);
        return;
      }

      fetch('/.netlify/functions/get-checkout-session?session_id=' + encodeURIComponent(sessionId))
        .then(function (response) {
          if (!response.ok) throw new Error('Unable to load checkout session');
          return response.json();
        })
        .then(function (data) {
          if (!data || typeof data.amountTotal !== 'number' || !data.currency) {
            trackPurchase(fallbackPayload);
            return;
          }
          trackPurchase({
            value: data.amountTotal,
            currency: data.currency
          });
        })
        .catch(function (error) {
          console.error('Meta Purchase tracking error:', error);
          trackPurchase(fallbackPayload);
        });
    })();
  </script>
</body>
</html>
